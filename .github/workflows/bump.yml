name: Bump Dependencies
on: workflow_dispatch
permissions:
  contents: write
jobs:
  Bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"
      - name: update golang dependencies
        run: |
          go get github.com/gotd/td@latest

      - name: Verify build and tests
        run: |
          go test -timeout 60s ./...

      - uses: stefanzweifel/git-auto-commit-action@fd157da78fa13d9383e5580d1fd1184d89554b51 # v4.15.1
        with:
          commit_message: "chore(deps): bump dependencies"
          commit_options: "--no-verify"
          repository: .
