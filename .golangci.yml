version: "2"

linters:
  default: standard
  enable:
    - gocritic
    - gosec
  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST1003"
        - "-ST1016"
    gosec:
      excludes:
        - G117

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples
      - generator

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples
      - generator
